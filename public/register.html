<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShareVerse</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Registration Page specific overrides */
    .avatar-upload-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border-color);
      margin: 10px auto;
      display: block;
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card" style="max-width: 420px; padding: 30px 25px;">
    <h1 class="auth-logo">Share<span>Verse</span></h1>
    
    <form id="register-form" enctype="multipart/form-data">
      <div style="text-align: center; margin-bottom: 15px;">
        <img id="avatar-preview-img" class="avatar-upload-preview" src="/uploads/profiles/default.png" alt="Avatar Preview">
        <label for="profilePicture" class="file-input-label" style="display: inline-flex; justify-content: center; width: auto; margin-top: 5px;">
          Choose Profile Photo
        </label>
        <input type="file" id="profilePicture" accept="image/*" style="display: none;">
      </div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Choose a username" required pattern="^[a-zA-Z0-9_]{3,15}$" title="Username must be 3-15 characters and contain only letters, numbers, or underscores">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" minlength="6" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" minlength="6" required>
      </div>
      
      <button type="submit" class="btn" id="submit-btn">Register</button>
    </form>
    
    <p class="auth-switch">
      Already have an account? <a href="/login.html">Login</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const registerForm = document.getElementById('register-form');
    const submitBtn = document.getElementById('submit-btn');
    const profilePicInput = document.getElementById('profilePicture');
    const avatarPreviewImg = document.getElementById('avatar-preview-img');

    // Handle Profile Picture Preview update
    profilePicInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        // Validate it's an image file
        if (!file.type.startsWith('image/')) {
          showToast('Please select a valid image file', 'danger');
          profilePicInput.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
          avatarPreviewImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const profilePictureFile = profilePicInput.files[0];

      // Front-end validations
      if (password !== confirmPassword) {
        showToast('Passwords do not match', 'danger');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Creating account...';

      // Create Multipart FormData payload
      const formData = new FormData();
      formData.append('name', name);
      formData.append('username', username);
      formData.append('email', email);
      formData.append('password', password);
      
      if (profilePictureFile) {
        formData.append('profilePicture', profilePictureFile);
      }

      try {
        const response = await api.auth.register(formData);
        if (response.success) {
          localStorage.setItem('token', response.token);
          localStorage.setItem('user', JSON.stringify(response.user));
          showToast('Registration successful! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1000);
        }
      } catch (error) {
        showToast(error.message, 'danger');
        submitBtn.disabled = false;
        submitBtn.innerText = 'Register';
      }
    });
  </script>
</body>
</html>
