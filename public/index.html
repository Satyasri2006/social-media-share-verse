<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - ShareVerse</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="app-container">
    <!-- Navbar injected here -->
    <header id="navbar-placeholder" style="grid-area: header;"></header>
    
    <!-- Sidebar injected here -->
    <aside id="sidebar-placeholder"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="feed-container">
        
        <!-- Create Post Card -->
        <div class="create-post-card">
          <div class="create-post-header">Create Post</div>
          <form id="create-post-form">
            <textarea id="caption-input" class="create-post-caption" placeholder="Write a caption... What's on your mind?" required></textarea>
            
            <!-- Dynamic File Preview Container -->
            <div id="media-preview" class="media-preview-container">
              <img id="preview-img" class="media-preview-img" style="display: none;">
              <video id="preview-vid" class="media-preview-vid" controls style="display: none;"></video>
              <button type="button" id="clear-preview-btn" class="remove-preview-btn">&times;</button>
            </div>

            <div class="create-post-actions">
              <div class="file-input-wrapper">
                <label for="media-input" class="file-input-label">
                  <svg style="width: 18px; height: 18px; fill: currentColor;" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                  Add Photo / Video
                </label>
                <input type="file" id="media-input" accept="image/*,video/*">
              </div>
              <button type="submit" id="post-submit-btn" class="btn create-post-btn">Share</button>
            </div>
          </form>
        </div>

        <!-- Feed Loader -->
        <div id="feed-loader" class="spinner-wrapper">
          <div class="spinner"></div>
        </div>

        <!-- Posts Feed Stream -->
        <div id="posts-feed" style="display: flex; flex-direction: column; gap: 20px;"></div>
        
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const createPostForm = document.getElementById('create-post-form');
    const captionInput = document.getElementById('caption-input');
    const mediaInput = document.getElementById('media-input');
    const mediaPreview = document.getElementById('media-preview');
    const previewImg = document.getElementById('preview-img');
    const previewVid = document.getElementById('preview-vid');
    const clearPreviewBtn = document.getElementById('clear-preview-btn');
    const postSubmitBtn = document.getElementById('post-submit-btn');
    const postsFeed = document.getElementById('posts-feed');
    const feedLoader = document.getElementById('feed-loader');

    let currentUser = {};
    try {
      currentUser = JSON.parse(localStorage.getItem('user')) || {};
    } catch(e) {
      currentUser = {};
    }

    // Helper: format timestamp into friendly date
    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHr = Math.floor(diffMin / 60);
      const diffDays = Math.floor(diffHr / 24);

      if (diffSec < 60) return 'Just now';
      if (diffMin < 60) return `${diffMin}m ago`;
      if (diffHr < 24) return `${diffHr}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Handle File Attachment Preview
    mediaInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        mediaPreview.style.display = 'block';
        if (file.type.startsWith('video/')) {
          previewImg.style.display = 'none';
          previewVid.style.display = 'block';
          previewVid.src = URL.createObjectURL(file);
        } else if (file.type.startsWith('image/')) {
          previewVid.style.display = 'none';
          previewImg.style.display = 'block';
          previewImg.src = URL.createObjectURL(file);
        } else {
          showToast('Invalid media type!', 'danger');
          clearPreview();
        }
      }
    });

    function clearPreview() {
      mediaInput.value = '';
      mediaPreview.style.display = 'none';
      previewImg.src = '';
      previewVid.src = '';
      previewImg.style.display = 'none';
      previewVid.style.display = 'none';
    }

    clearPreviewBtn.addEventListener('click', clearPreview);

    // Handle Creating a Post
    createPostForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const caption = captionInput.value.trim();
      const mediaFile = mediaInput.files[0];

      if (!caption && !mediaFile) {
        showToast('Please add a caption or attach media!', 'danger');
        return;
      }

      postSubmitBtn.disabled = true;
      postSubmitBtn.innerText = 'Sharing...';

      const formData = new FormData();
      formData.append('caption', caption);
      if (mediaFile) {
        formData.append('media', mediaFile);
      }

      try {
        const response = await api.posts.create(formData);
        if (response.success) {
          showToast('Post shared successfully!', 'success');
          captionInput.value = '';
          clearPreview();
          // Render new post at the top of feed
          renderPostCard(response.post, true);
        }
      } catch (error) {
        showToast(error.message, 'danger');
      } finally {
        postSubmitBtn.disabled = false;
        postSubmitBtn.innerText = 'Share';
      }
    });

    // Render a single post card in feed
    function renderPostCard(post, prepend = false) {
      const isOwner = post.user._id === currentUser._id;
      const mediaHtml = post.mediaType === 'image' 
        ? `<div class="post-body"><img src="${post.mediaUrl}" class="post-media" alt="Post photo"></div>`
        : post.mediaType === 'video'
        ? `<div class="post-body"><video src="${post.mediaUrl}" class="post-media" controls></video></div>`
        : ''; // text only

      const deleteBtnHtml = isOwner 
        ? `<button class="post-action-btn delete-post-btn" data-id="${post._id}" title="Delete Post" style="background:none; border:none; cursor:pointer;">
             <svg style="width:20px; height:20px; fill:var(--text-secondary);" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
           </button>`
        : '';

      const postCard = document.createElement('div');
      postCard.className = 'post-card';
      postCard.id = `post-card-${post._id}`;
      postCard.innerHTML = `
        <div class="post-header">
          <div class="post-author">
            <a href="/profile.html?username=${post.user.username}">
              <img src="${post.user.profilePicture || '/uploads/profiles/default.png'}" class="post-author-avatar" alt="Avatar" onerror="this.src='/uploads/profiles/default.png'">
            </a>
            <div>
              <a href="/profile.html?username=${post.user.username}" class="post-author-name">${post.user.name}</a>
              <span class="post-author-username">@${post.user.username}</span>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <span class="post-time">${formatTime(post.createdAt)}</span>
            ${deleteBtnHtml}
          </div>
        </div>

        ${mediaHtml}

        <div class="post-info-section">
          <div class="post-actions">
            <button class="post-action-btn like-btn ${post.isLiked ? 'liked' : ''}" data-id="${post._id}">
              <svg viewBox="0 0 24 24">
                <path d="${post.isLiked ? 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z' : 'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09z'}"/>
              </svg>
            </button>
            <a href="/post-details.html?id=${post._id}" class="post-action-btn" title="Comment Thread">
              <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
            </a>
          </div>
          
          <div class="post-likes"><span id="likes-count-${post._id}">${post.likesCount || 0}</span> likes</div>
          
          <div class="post-caption">
            <span class="post-caption-user">${post.user.username}</span>
            <span>${post.caption || ''}</span>
          </div>

          <a href="/post-details.html?id=${post._id}" class="post-view-comments">View comments thread</a>
        </div>

        <div class="comment-section-box">
          <form class="comment-input-form" data-postid="${post._id}">
            <input type="text" class="comment-input" placeholder="Add a comment..." required>
            <button type="submit" class="comment-submit-btn">Post</button>
          </form>
        </div>
      `;

      if (prepend) {
        postsFeed.insertBefore(postCard, postsFeed.firstChild);
      } else {
        postsFeed.appendChild(postCard);
      }
    }

    // Load feed posts
    async function loadFeed() {
      try {
        feedLoader.style.display = 'flex';
        postsFeed.innerHTML = '';
        const response = await api.posts.getAll();
        
        if (response.success) {
          feedLoader.style.display = 'none';
          if (response.posts.length === 0) {
            postsFeed.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-secondary);">No posts in feed. Start sharing!</div>`;
          } else {
            response.posts.forEach((post) => renderPostCard(post));
          }
        }
      } catch (error) {
        showToast(error.message, 'danger');
        feedLoader.style.display = 'none';
      }
    }

    // Event Delegation: Post Interactions (Like, Delete, Quick Comment)
    document.addEventListener('click', async (e) => {
      // 1. Like Action
      const likeBtn = e.target.closest('.like-btn');
      if (likeBtn) {
        const postId = likeBtn.dataset.id;
        try {
          const response = await api.posts.toggleLike(postId);
          if (response.success) {
            likeBtn.classList.toggle('liked', response.isLiked);
            const pathNode = likeBtn.querySelector('path');
            if (response.isLiked) {
              pathNode.setAttribute('d', 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            } else {
              pathNode.setAttribute('d', 'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09z');
            }
            document.getElementById(`likes-count-${postId}`).innerText = response.likesCount;
          }
        } catch (error) {
          showToast(error.message, 'danger');
        }
        return;
      }

      // 2. Delete Post Action
      const deleteBtn = e.target.closest('.delete-post-btn');
      if (deleteBtn) {
        const postId = deleteBtn.dataset.id;
        if (confirm('Are you sure you want to delete this post?')) {
          try {
            const response = await api.posts.delete(postId);
            if (response.success) {
              showToast('Post deleted successfully', 'success');
              document.getElementById(`post-card-${postId}`).remove();
            }
          } catch (error) {
            showToast(error.message, 'danger');
          }
        }
        return;
      }
    });

    // Quick Comment Submit listener
    document.addEventListener('submit', async (e) => {
      const commentForm = e.target.closest('.comment-input-form');
      if (commentForm) {
        e.preventDefault();
        const postId = commentForm.dataset.postid;
        const input = commentForm.querySelector('.comment-input');
        const text = input.value.trim();

        if (!text) return;

        try {
          const response = await api.comments.add(postId, text);
          if (response.success) {
            showToast('Comment posted!', 'success');
            input.value = '';
            // Redirect to post details to view thread
            setTimeout(() => {
              window.location.href = `/post-details.html?id=${postId}`;
            }, 500);
          }
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }
    });

    // Run on startup
    loadFeed();
  </script>
</body>
</html>
